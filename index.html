<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>microDOS(2) Animated Playbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-fast {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .scene {
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }
        .scene.active {
            display: flex;
        }
        .emoji-art {
            font-size: 6rem;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            animation: slideInRight 0.6s ease-out forwards;
        }
        .progress-bar-fill {
            transition: width 0.1s linear;
        }
    </style>
</head>
<body class="bg-slate-900 h-screen flex flex-col items-center justify-center p-4 font-sans text-slate-100 overflow-hidden">

    <!-- Video Player Container -->
    <div class="relative w-full max-w-4xl aspect-video bg-slate-800 rounded-2xl shadow-2xl border-4 border-slate-700 flex flex-col overflow-hidden">
        
        <!-- Screen/Canvas -->
        <div id="screen" class="flex-1 relative flex flex-col items-center justify-center p-8 text-center">
            
            <!-- START SCREEN -->
            <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-800 z-20">
                <div class="text-6xl mb-4">▶️</div>
                <h1 class="text-4xl font-bold mb-2 text-blue-400">microDOS(2)</h1>
                <p class="text-xl text-slate-400 mb-8">Retail Distributor Playbook</p>
                <button id="start-btn" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-full transition transform hover:scale-105 shadow-lg">
                    Play Presentation
                </button>
            </div>

            <!-- SCENE CONTAINER (Dynamically injected) -->
            <div id="scene-container" class="w-full h-full flex flex-col items-center justify-center"></div>

        </div>

        <!-- Progress Bar -->
        <div class="w-full h-2 bg-slate-700">
            <div id="progress" class="progress-bar-fill h-full bg-blue-500 w-0"></div>
        </div>

        <!-- Controls -->
        <div class="bg-slate-900 p-4 flex items-center justify-between border-t border-slate-700">
            <div class="flex items-center space-x-4">
                <button id="play-pause-btn" class="w-10 h-10 flex items-center justify-center bg-slate-700 hover:bg-slate-600 rounded-full transition disabled:opacity-50">
                    ⏸️
                </button>
                <button id="replay-btn" class="w-10 h-10 flex items-center justify-center bg-slate-700 hover:bg-slate-600 rounded-full transition disabled:opacity-50">
                    🔄
                </button>
                <span id="time-display" class="font-mono text-sm text-slate-400">00:00 / 00:00</span>
            </div>
            <div class="text-sm text-slate-500 font-bold uppercase tracking-wider">Automated Sales Logic</div>
        </div>
    </div>

    <!-- Script Logic -->
    <script>
        // Data parsed from microdos_distributor_guide.md
        const scenes = [
            {
                id: 1,
                duration: 6000,
                html: `
                    <div class="text-orange-500 text-2xl font-bold mb-2 tracking-widest uppercase">The Problem</div>
                    <div class="flex justify-center gap-8 mb-8">
                        <div class="emoji-art" style="animation-delay: 0.1s">🍬</div>
                        <div class="emoji-art" style="animation-delay: 0.3s">🤢</div>
                        <div class="emoji-art" style="animation-delay: 0.5s">⏳</div>
                    </div>
                    <h2 class="text-3xl font-bold mb-4">Current Psychedelics Fail</h2>
                    <p class="text-xl text-slate-300 max-w-2xl">Mushroom gummies use proprietary blends or organic matter (chitin). This causes severe nausea, inconsistent dosing, and a 45-90 minute onset delay.</p>
                `
            },
            {
                id: 2,
                duration: 7000,
                html: `
                    <div class="text-blue-400 text-2xl font-bold mb-2 tracking-widest uppercase">The Solution</div>
                    <div class="flex justify-center gap-8 mb-8">
                        <div class="emoji-art" style="animation-delay: 0.1s; animation: pulse-fast 2s infinite">💊</div>
                        <div class="emoji-art" style="animation-delay: 0.3s">⚡</div>
                    </div>
                    <h2 class="text-3xl font-bold mb-4">microDOS(2) Precision</h2>
                    <div class="grid grid-cols-2 gap-4 text-left bg-slate-700 p-6 rounded-xl max-w-2xl mx-auto">
                        <div><span class="text-blue-400 font-bold">Compound:</span> 2mg 4-HO-MET</div>
                        <div><span class="text-blue-400 font-bold">Onset:</span> ~10 Minutes</div>
                        <div><span class="text-blue-400 font-bold">Form:</span> Scored Pill</div>
                        <div><span class="text-blue-400 font-bold">Nausea:</span> Zero</div>
                    </div>
                `
            },
            {
                id: 3,
                duration: 6000,
                html: `
                    <div class="text-green-400 text-2xl font-bold mb-2 tracking-widest uppercase">B2B Value (ROI)</div>
                    <div class="flex justify-center gap-8 mb-8">
                        <div class="emoji-art" style="animation-delay: 0.1s">🔁</div>
                        <div class="emoji-art" style="animation-delay: 0.3s">📈</div>
                    </div>
                    <h2 class="text-3xl font-bold mb-4">Why Shops Want It</h2>
                    <p class="text-xl text-slate-300 max-w-2xl">Predictable fast-onset experiences breed habits. Habits breed recurring revenue. High margin vs standard gummies, with a tiny shelf footprint.</p>
                `
            },
            {
                id: 4,
                duration: 7000,
                html: `
                    <div class="text-purple-400 text-2xl font-bold mb-2 tracking-widest uppercase">Sales Script A</div>
                    <div class="flex justify-center items-center gap-4 mb-8">
                        <div class="emoji-art text-5xl">🤷‍♂️</div>
                        <div class="text-2xl font-mono text-slate-400">"I want shroom gummies"</div>
                    </div>
                    <h2 class="text-3xl font-bold mb-4">The Tripper</h2>
                    <div class="bg-slate-700 p-6 rounded-xl border-l-4 border-purple-500 max-w-2xl mx-auto text-left text-lg">
                        <strong class="text-purple-300">Action:</strong> Redirect.<br>
                        <strong class="text-purple-300">Say:</strong> "If you hate the stomach ache and waiting an hour, try these pills. Hits in 10 minutes. Clean cognitive lift."
                    </div>
                `
            },
            {
                id: 5,
                duration: 7000,
                html: `
                    <div class="text-yellow-400 text-2xl font-bold mb-2 tracking-widest uppercase">Sales Script B</div>
                    <div class="flex justify-center items-center gap-4 mb-8">
                        <div class="emoji-art text-5xl">🧑‍💻</div>
                        <div class="text-2xl font-mono text-slate-400">"I need focus/energy"</div>
                    </div>
                    <h2 class="text-3xl font-bold mb-4">The Nootropic Seeker</h2>
                    <div class="bg-slate-700 p-6 rounded-xl border-l-4 border-yellow-500 max-w-2xl mx-auto text-left text-lg">
                        <strong class="text-yellow-300">Action:</strong> Pitch Utility.<br>
                        <strong class="text-yellow-300">Say:</strong> "This is a precision microdose. Snap the pill in half for exactly 1mg. Flow-state and clarity without jitteriness."
                    </div>
                `
            },
            {
                id: 6,
                duration: 7000,
                html: `
                    <div class="text-red-400 text-2xl font-bold mb-2 tracking-widest uppercase">Handling Objections</div>
                    <div class="flex justify-center gap-8 mb-8">
                        <div class="emoji-art text-5xl">👮</div>
                        <div class="emoji-art text-5xl">🔬</div>
                    </div>
                    <div class="grid grid-cols-2 gap-6 max-w-3xl mx-auto text-left">
                        <div class="bg-slate-700 p-4 rounded text-sm">
                            <strong class="text-red-300 block mb-1">"Is it Legal?"</strong>
                            Yes. 4-HO-MET is not a federally scheduled substance.
                        </div>
                        <div class="bg-slate-700 p-4 rounded text-sm">
                            <strong class="text-red-300 block mb-1">"Will I hallucinate?"</strong>
                            At 1-2mg it is sub-perceptual to very light. It acts as an enhancer, not a heavy trip.
                        </div>
                    </div>
                `
            },
            {
                id: 7,
                duration: 5000,
                html: `
                    <div class="text-blue-400 text-2xl font-bold mb-2 tracking-widest uppercase">Distributor Checklist</div>
                    <div class="flex flex-col gap-4 text-left max-w-xl mx-auto text-xl bg-slate-800 p-8 rounded-2xl border border-slate-600">
                        <div class="flex items-center gap-3"><span class="text-green-500">✅</span> Demo the 10-min onset</div>
                        <div class="flex items-center gap-3"><span class="text-green-500">✅</span> Place 2-pill Trial Packs at register</div>
                        <div class="flex items-center gap-3"><span class="text-green-500">✅</span> Leave scripts for retail employees</div>
                    </div>
                `
            }
        ];

        // Player State
        let isPlaying = false;
        let currentSceneIndex = 0;
        let totalDuration = scenes.reduce((acc, scene) => acc + scene.duration, 0);
        let currentTime = 0;
        let animationFrameId;
        let lastTimestamp;

        // DOM Elements
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const sceneContainer = document.getElementById('scene-container');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const replayBtn = document.getElementById('replay-btn');
        const progressBar = document.getElementById('progress');
        const timeDisplay = document.getElementById('time-display');

        // Initialization
        playPauseBtn.disabled = true;
        replayBtn.disabled = true;

        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            playPauseBtn.disabled = false;
            replayBtn.disabled = false;
            startPlaying();
        });

        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                pausePlaying();
            } else {
                resumePlaying();
            }
        });

        replayBtn.addEventListener('click', () => {
            currentTime = 0;
            currentSceneIndex = 0;
            if (!isPlaying) startPlaying();
        });

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateUI() {
            // Update Progress Bar
            const progressPercent = (currentTime / totalDuration) * 100;
            progressBar.style.width = `${Math.min(progressPercent, 100)}%`;
            
            // Update Time Text
            timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(totalDuration)}`;

            // Determine current scene
            let accumulatedTime = 0;
            let newSceneIndex = scenes.length - 1; // Default to last
            
            for (let i = 0; i < scenes.length; i++) {
                accumulatedTime += scenes[i].duration;
                if (currentTime < accumulatedTime) {
                    newSceneIndex = i;
                    break;
                }
            }

            // Render scene if changed
            if (newSceneIndex !== currentSceneIndex || sceneContainer.innerHTML === '') {
                currentSceneIndex = newSceneIndex;
                renderScene(currentSceneIndex);
            }

            // Handle end of video
            if (currentTime >= totalDuration) {
                pausePlaying();
                currentTime = totalDuration; // Cap it
                playPauseBtn.innerHTML = '▶️';
            }
        }

        function renderScene(index) {
            if (!scenes[index]) return;
            // Clear current content
            sceneContainer.innerHTML = '';
            
            // Create new scene wrapper
            const sceneEl = document.createElement('div');
            sceneEl.className = 'scene active w-full flex-col items-center';
            sceneEl.innerHTML = scenes[index].html;
            
            sceneContainer.appendChild(sceneEl);
        }

        function loop(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const deltaTime = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            if (isPlaying) {
                currentTime += deltaTime;
                updateUI();
                if (currentTime < totalDuration) {
                    animationFrameId = requestAnimationFrame(loop);
                }
            }
        }

        function startPlaying() {
            isPlaying = true;
            playPauseBtn.innerHTML = '⏸️';
            lastTimestamp = performance.now();
            animationFrameId = requestAnimationFrame(loop);
        }

        function pausePlaying() {
            isPlaying = false;
            playPauseBtn.innerHTML = '▶️';
            cancelAnimationFrame(animationFrameId);
            lastTimestamp = null;
        }

        function resumePlaying() {
            if (currentTime >= totalDuration) {
                currentTime = 0; // Restart if at the end
            }
            startPlaying();
        }

    </script>
</body>
</html>
